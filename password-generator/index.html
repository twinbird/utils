<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>パスワード生成</title>
    <meta
      name="description"
      content="使用可能な文字種と任意の文字列を指定して、ランダムなパスワードを生成できるツールです。"
    />
    <link rel="stylesheet" href="app.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="container">
      <h1>パスワード生成</h1>

      <section class="panel" aria-labelledby="settings-heading">
        <h2 id="settings-heading">生成条件</h2>

        <label class="field">
          <span>文字数</span>
          <input id="length" type="number" min="1" max="256" value="16" />
        </label>

        <fieldset>
          <legend>使用可能文字種</legend>
          <label>
            <input
              class="char-type"
              type="checkbox"
              value="lowercase"
              checked
            />
            a-z
          </label>
          <label>
            <input
              class="char-type"
              type="checkbox"
              value="uppercase"
              checked
            />
            A-Z
          </label>
          <label>
            <input class="char-type" type="checkbox" value="numbers" checked />
            0-9
          </label>
          <label>
            <input class="char-type" type="checkbox" value="symbols" checked />
            !@#$%^&amp;*
          </label>
        </fieldset>

        <label class="field" for="custom-chars">
          <span>追加で使用する文字列</span>
          <input
            id="custom-chars"
            type="text"
            spellcheck="false"
            placeholder="例: あいうえお_-"
          />
        </label>

        <button id="regenerate-btn" type="button">再生成</button>
      </section>

      <section class="panel" aria-labelledby="result-heading">
        <h2 id="result-heading">生成結果</h2>
        <div class="result-row">
          <input
            id="result"
            type="text"
            readonly
            spellcheck="false"
            placeholder="ここに生成されたパスワードが表示されます"
          />
          <button id="copy-btn" type="button">コピー</button>
        </div>
      </section>
    </main>
  </body>
</html>
