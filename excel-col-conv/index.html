<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excel列番号変換</title>
    <link rel="stylesheet" href="app.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <h1>Excel列番号変換</h1>

    <h3>列名→列番号</h3>
    <div>
      <input type="text" id="column-name-input" class="column-input" />
      <span>→</span>
      <input
        type="text"
        id="column-number-output"
        class="column-output"
        readonly
      />
    </div>

    <h3>列番号→列名</h3>
    <div>
      <input type="text" id="column-number-input" class="column-input" />
      <span>→</span>
      <input
        type="text"
        id="column-name-output"
        class="column-output"
        readonly
      />
    </div>
  </body>
</html>
