<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSONフォーマッタ</title>
    <meta
      name="description"
      content="JSONを読みやすく整形して、結果をコピーできるツールです。"
    />
    <link rel="stylesheet" href="app.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>JSONフォーマッタ</h1>

      <label for="json-input">入力JSON</label>
      <textarea id="json-input" spellcheck="false"></textarea>

      <div class="controls">
        <div class="control">
          <label for="indent-type">インデント</label>
          <select id="indent-type">
            <option value="space">スペース</option>
            <option value="tab">tab</option>
          </select>
        </div>

        <div class="control">
          <label for="indent-size">インデントサイズ</label>
          <select id="indent-size">
            <option value="2" selected>2</option>
            <option value="4">4</option>
            <option value="8">8</option>
          </select>
        </div>
      </div>

      <div class="button-row">
        <button id="format-btn" type="button">フォーマットする</button>
        <button id="copy-btn" type="button">結果をコピー</button>
      </div>

      <p id="status-message" class="status-message" aria-live="polite"></p>

      <label for="json-output">整形結果</label>
      <textarea
        id="json-output"
        readonly
        spellcheck="false"
        placeholder="ここに整形したJSONが表示されます"
      ></textarea>
    </div>
  </body>
</html>
